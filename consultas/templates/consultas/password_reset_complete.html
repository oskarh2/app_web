{% extends 'base.html' %}
{% block title %}Contraseña Restablecida{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="bi bi-check-circle-fill"></i> ¡Contraseña Restablecida!</h4>
                </div>
                <div class="card-body text-center">
                    <i class="bi bi-shield-check fs-1 text-success mb-3 d-block"></i>
                    <p>Tu contraseña ha sido restablecida exitosamente.</p>
                    <p class="text-muted">Ahora puedes iniciar sesión con tu nueva contraseña.</p>
                    
                    <a href="{% url 'cuentas:login' %}" class="btn btn-success">
                        <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
