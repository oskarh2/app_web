{% extends 'base.html' %}
{% block title %}Restablecer Contraseña{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-envelope"></i> Restablecer Contraseña</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4">
                        ¿Olvidaste tu contraseña? Ingresa tu correo electrónico y te enviaremos 
                        instrucciones para crear una nueva.
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Correo Electrónico</label>
                            <input type="email" name="email" class="form-control" 
                                   id="id_email" required autofocus>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-send"></i> Enviar Instrucciones
                        </button>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <a href="{% url 'cuentas:login' %}" class="text-decoration-none">
                            <i class="bi bi-arrow-left"></i> Volver al Inicio de Sesión
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
