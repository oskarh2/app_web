{% extends 'base.html' %}
{% block title %}Confirmar Eliminación{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white py-3">
                <h5 class="mb-0 fw-bold"><i class="bi bi-exclamation-triangle me-2"></i>Confirmar Eliminación</h5>
            </div>
            <div class="card-body p-4">
                <p class="mb-3">¿Estás seguro de que deseas eliminar la cuenta <strong>"{{ cuenta.nombre }}"</strong>?</p>
                <p class="text-muted small mb-4">⚠️ Esta acción no se puede deshacer.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash me-1"></i>Sí, Eliminar
                        </button>
                        <a href="{% url 'cuentas:lista' %}" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-arrow-left me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
