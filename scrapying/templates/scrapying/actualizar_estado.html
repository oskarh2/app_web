{% extends 'base.html' %}
{% block title %}Actualizar Estado{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white py-3">
                <h4 class="mb-0 fw-bold">
                    <i class="bi bi-arrow-repeat me-2"></i>Actualizar Estado
                </h4>
            </div>
            <div class="card-body p-4">
                <p class="mb-3">
                    <strong>Page:</strong> {{ tracking.page }}<br>
                    <strong>Estado actual:</strong> 
                    <span class="badge 
                        {% if tracking.status == 'PENDING' %}bg-warning
                        {% elif tracking.status == 'IN_PROGRESS' %}bg-info
                        {% elif tracking.status == 'COMPLETED' %}bg-success
                        {% elif tracking.status == 'FAILED' %}bg-danger
                        {% endif %}">
                        {{ tracking.get_status_display }}
                    </span>
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nuevo Estado</label>
                        <select name="status" class="form-select" required>
                            {% for value, label in status_choices %}
                                <option value="{{ value }}" {% if tracking.status == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i>Actualizar
                        </button>
                        <a href="{% url 'page_tracking:lista' %}" class="btn btn-secondary">
                            <i class="bi bi-x-circle me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
